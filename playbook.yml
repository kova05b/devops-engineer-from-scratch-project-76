---
- hosts: all
  become: true
  serial: 1

  pre_tasks:
    - name: Ensure Ubuntu universe repository is enabled
      ansible.builtin.apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_distribution_release }} universe"
        state: present
        update_cache: true
      when: ansible_distribution == "Ubuntu"
      tags:
        - prepare

  roles:
    - role: geerlingguy.pip
      tags:
        - prepare
    - role: geerlingguy.docker
      tags:
        - prepare
    - role: datadog.datadog
      when: inventory_hostname in groups.get('webservers', [])
      tags:
        - monitoring

  tasks:
    - name: Ensure Redmine app directory exists
      ansible.builtin.file:
        path: "{{ redmine_app_path }}"
        state: directory
        mode: "0755"
      tags:
        - deploy

    - name: Render Redmine environment file
      ansible.builtin.template:
        src: templates/redmine.env.j2
        dest: "{{ redmine_app_path }}/.env"
        mode: "0600"
      tags:
        - deploy

    - name: Pull Redmine image
      ansible.builtin.command:
        cmd: "docker pull {{ redmine_image }}"
      tags:
        - deploy

    - name: Remove existing Redmine container if present
      ansible.builtin.command:
        cmd: "docker rm -f {{ redmine_container_name }}"
      register: redmine_remove_result
      changed_when: redmine_remove_result.rc == 0
      failed_when: redmine_remove_result.rc not in [0, 1]
      tags:
        - deploy

    - name: Run Redmine container
      ansible.builtin.command:
        cmd: >-
          docker run -d
          --name {{ redmine_container_name }}
          --restart always
          --env-file {{ redmine_app_path }}/.env
          -p {{ redmine_port }}:3000
          -v redmine_files:/usr/src/redmine/files
          {{ redmine_image }}
      tags:
        - deploy

    - name: Wait for Redmine port to become available
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ redmine_port }}"
        delay: 5
        timeout: 600
      tags:
        - deploy

    - name: Verify Redmine responds over HTTP
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ redmine_port }}"
        status_code:
          - 200
          - 302
      register: redmine_http_check
      retries: 60
      delay: 10
      until: redmine_http_check.status in [200, 302]
      tags:
        - deploy
